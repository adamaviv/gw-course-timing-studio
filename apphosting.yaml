# Settings for Backend (on Cloud Run).
# See https://firebase.google.com/docs/app-hosting/configure#cloud-run
runConfig:
  minInstances: 0
  # maxInstances: 100
  # concurrency: 80
  # cpu: 1
  # memoryMiB: 512

# Environment variables and secrets.
env:
  # Base release tag used for computed app versions (v<major>.<minor>-Build-<shortHash>).
  - variable: APP_VERSION_BASE_TAG
    value: v0.3
    availability:
      - BUILD
      - RUNTIME
